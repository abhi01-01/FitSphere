<svg width="1600" height="860" viewBox="0 0 1600 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="flowBg" x1="0" y1="0" x2="1600" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F8FA"/>
      <stop offset="1" stop-color="#EEF3F1"/>
    </linearGradient>
    <filter id="flowShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="flowArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10" stroke="#475569" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </marker>
    <style>
      .title { font: 700 32px Inter, Arial, sans-serif; fill: #11211B; }
      .subtitle { font: 500 16px Inter, Arial, sans-serif; fill: #5B6B63; }
      .lane { fill: #FFFFFF; stroke: #D8E1DC; stroke-width: 1.5; }
      .laneTitle { font: 700 18px Inter, Arial, sans-serif; fill: #173C30; }
      .stepTitle { font: 700 18px Inter, Arial, sans-serif; fill: #13221B; }
      .stepBody { font: 500 14px Inter, Arial, sans-serif; fill: #576760; }
      .stepNum { font: 700 14px Inter, Arial, sans-serif; fill: #FFFFFF; }
      .line { stroke: #475569; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#flowArrow); }
    </style>
  </defs>

  <rect width="1600" height="860" fill="url(#flowBg)"/>
  <text x="80" y="80" class="title">Activity to Recommendation Flow</text>
  <text x="80" y="110" class="subtitle">The recommendation path is eventually consistent: the workout is saved first, then AI processing runs asynchronously through RabbitMQ.</text>

  <rect x="70" y="160" width="220" height="620" rx="28" class="lane"/>
  <rect x="310" y="160" width="220" height="620" rx="28" class="lane"/>
  <rect x="550" y="160" width="220" height="620" rx="28" class="lane"/>
  <rect x="790" y="160" width="220" height="620" rx="28" class="lane"/>
  <rect x="1030" y="160" width="220" height="620" rx="28" class="lane"/>
  <rect x="1270" y="160" width="260" height="620" rx="28" class="lane"/>

  <text x="135" y="210" class="laneTitle">Frontend</text>
  <text x="364" y="210" class="laneTitle">Gateway</text>
  <text x="600" y="210" class="laneTitle">User Service</text>
  <text x="822" y="210" class="laneTitle">Activity Service</text>
  <text x="1062" y="210" class="laneTitle">RabbitMQ</text>
  <text x="1343" y="210" class="laneTitle">AI Service + Gemini</text>

  <rect x="105" y="250" width="150" height="88" rx="22" fill="#F0F7F3" stroke="#BCD6C8" stroke-width="1.5" filter="url(#flowShadow)"/>
  <circle cx="130" cy="275" r="15" fill="#206A4B"/><text x="124.5" y="280.5" class="stepNum">1</text>
  <text x="155" y="278" class="stepTitle">POST /activities</text>
  <text x="155" y="302" class="stepBody">Bearer token +</text>
  <text x="155" y="321" class="stepBody">workout payload</text>

  <rect x="345" y="250" width="150" height="96" rx="22" fill="#FFFFFF" stroke="#CCD7D1" stroke-width="1.5" filter="url(#flowShadow)"/>
  <circle cx="370" cy="275" r="15" fill="#206A4B"/><text x="364.5" y="280.5" class="stepNum">2</text>
  <text x="395" y="278" class="stepTitle">Sync identity</text>
  <text x="395" y="302" class="stepBody">JWT subject becomes</text>
  <text x="395" y="321" class="stepBody">the canonical user id</text>

  <rect x="585" y="250" width="150" height="96" rx="22" fill="#EDF6FF" stroke="#BDD7F0" stroke-width="1.5" filter="url(#flowShadow)"/>
  <circle cx="610" cy="275" r="15" fill="#206A4B"/><text x="604.5" y="280.5" class="stepNum">3</text>
  <text x="635" y="278" class="stepTitle">Validate user</text>
  <text x="635" y="302" class="stepBody">Create or confirm</text>
  <text x="635" y="321" class="stepBody">the Keycloak subject</text>

  <rect x="825" y="250" width="150" height="114" rx="22" fill="#EDF6FF" stroke="#BDD7F0" stroke-width="1.5" filter="url(#flowShadow)"/>
  <circle cx="850" cy="275" r="15" fill="#206A4B"/><text x="844.5" y="280.5" class="stepNum">4</text>
  <text x="875" y="278" class="stepTitle">Persist activity</text>
  <text x="875" y="302" class="stepBody">Validate user, store</text>
  <text x="875" y="321" class="stepBody">session in MongoDB,</text>
  <text x="875" y="340" class="stepBody">return 200 to client</text>

  <rect x="1065" y="250" width="150" height="96" rx="22" fill="#FFFFFF" stroke="#CCD7D1" stroke-width="1.5" filter="url(#flowShadow)"/>
  <circle cx="1090" cy="275" r="15" fill="#206A4B"/><text x="1084.5" y="280.5" class="stepNum">5</text>
  <text x="1115" y="278" class="stepTitle">Queue event</text>
  <text x="1115" y="302" class="stepBody">Activity message is</text>
  <text x="1115" y="321" class="stepBody">published for AI work</text>

  <rect x="1305" y="250" width="190" height="114" rx="22" fill="#FFF6F1" stroke="#F0C8B4" stroke-width="1.5" filter="url(#flowShadow)"/>
  <circle cx="1330" cy="275" r="15" fill="#206A4B"/><text x="1324.5" y="280.5" class="stepNum">6</text>
  <text x="1355" y="278" class="stepTitle">Consume and prompt</text>
  <text x="1355" y="302" class="stepBody">AI service consumes</text>
  <text x="1355" y="321" class="stepBody">the event and calls</text>
  <text x="1355" y="340" class="stepBody">Gemini for analysis</text>

  <rect x="1305" y="448" width="190" height="114" rx="22" fill="#FFF6F1" stroke="#F0C8B4" stroke-width="1.5" filter="url(#flowShadow)"/>
  <circle cx="1330" cy="473" r="15" fill="#206A4B"/><text x="1324.5" y="478.5" class="stepNum">7</text>
  <text x="1355" y="476" class="stepTitle">Store recommendation</text>
  <text x="1355" y="500" class="stepBody">Structured coaching</text>
  <text x="1355" y="519" class="stepBody">output is saved in</text>
  <text x="1355" y="538" class="stepBody">the AI Mongo database</text>

  <rect x="105" y="620" width="150" height="96" rx="22" fill="#F0F7F3" stroke="#BCD6C8" stroke-width="1.5" filter="url(#flowShadow)"/>
  <circle cx="130" cy="645" r="15" fill="#206A4B"/><text x="124.5" y="650.5" class="stepNum">8</text>
  <text x="155" y="648" class="stepTitle">GET recommendation</text>
  <text x="155" y="672" class="stepBody">UI asks for</text>
  <text x="155" y="691" class="stepBody">activity guidance</text>

  <rect x="345" y="620" width="150" height="96" rx="22" fill="#FFFFFF" stroke="#CCD7D1" stroke-width="1.5" filter="url(#flowShadow)"/>
  <circle cx="370" cy="645" r="15" fill="#206A4B"/><text x="364.5" y="650.5" class="stepNum">9</text>
  <text x="395" y="648" class="stepTitle">Route request</text>
  <text x="395" y="672" class="stepBody">Gateway forwards to</text>
  <text x="395" y="691" class="stepBody">AI service via Eureka</text>

  <rect x="1305" y="620" width="190" height="96" rx="22" fill="#FFF6F1" stroke="#F0C8B4" stroke-width="1.5" filter="url(#flowShadow)"/>
  <circle cx="1330" cy="645" r="15" fill="#206A4B"/><text x="1321" y="650.5" class="stepNum">10</text>
  <text x="1355" y="648" class="stepTitle">Return 200 or 404</text>
  <text x="1355" y="672" class="stepBody">200 when ready, 404 if</text>
  <text x="1355" y="691" class="stepBody">the recommendation is not yet there</text>

  <path d="M255 294H345" class="line"/>
  <path d="M495 294H585" class="line"/>
  <path d="M735 306H825" class="line"/>
  <path d="M975 306H1065" class="line"/>
  <path d="M1215 306H1305" class="line"/>
  <path d="M1400 364V448" class="line"/>
  <path d="M255 664H345" class="line"/>
  <path d="M495 664H1400V620" class="line"/>

  <text x="802" y="116" class="stepBody" text-anchor="middle">Client response returns immediately after step 4. Steps 5–7 continue in the background.</text>
</svg>
