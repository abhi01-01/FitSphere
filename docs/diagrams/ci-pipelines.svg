<svg width="2200" height="1300" viewBox="0 0 2200 1300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ciBg" x1="0" y1="0" x2="2200" y2="1300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F7FB"/>
      <stop offset="1" stop-color="#EEF3F1"/>
    </linearGradient>
    <filter id="ciShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <style>
      .title { font: 700 44px Inter, Arial, sans-serif; fill: #11211B; }
      .subtitle { font: 500 20px Inter, Arial, sans-serif; fill: #5B6B63; }
      .panel { fill: #FFFFFF; stroke: #D8E1DC; stroke-width: 1.5; }
      .cardTitle { font: 700 20px Inter, Arial, sans-serif; fill: #13221B; }
      .cardMeta { font: 600 14px Inter, Arial, sans-serif; fill: #206A4B; }
      .cardBody { font: 500 16px Inter, Arial, sans-serif; fill: #56655E; }
      .panelTitle { font: 700 24px Inter, Arial, sans-serif; fill: #173C30; }
    </style>
  </defs>

  <rect width="2200" height="1300" fill="url(#ciBg)"/>
  <text x="90" y="96" class="title">Independent CI Pipelines</text>
  <text x="90" y="132" class="subtitle">Each microservice and the frontend have their own GitHub Actions workflow so changes can be validated independently with path-based triggers.</text>

  <rect x="90" y="210" width="2020" height="980" rx="34" class="panel"/>
  <text x="140" y="268" class="panelTitle">Workflows under .github/workflows/</text>

  <rect x="140" y="330" width="360" height="180" rx="24" fill="#F0F7F3" stroke="#BCD6C8" stroke-width="1.5" filter="url(#ciShadow)"/>
  <text x="176" y="378" class="cardMeta">frontend.yml</text>
  <text x="176" y="416" class="cardTitle">Frontend pipeline</text>
  <text x="176" y="454" class="cardBody">Runs on changes under</text>
  <text x="176" y="482" class="cardBody">fitness-app-frontend/</text>
  <text x="176" y="510" class="cardBody">Commands: npm ci, lint, build</text>

  <rect x="560" y="330" width="360" height="180" rx="24" fill="#EDF6FF" stroke="#BDD7F0" stroke-width="1.5" filter="url(#ciShadow)"/>
  <text x="596" y="378" class="cardMeta">eureka.yml</text>
  <text x="596" y="416" class="cardTitle">Eureka pipeline</text>
  <text x="596" y="454" class="cardBody">Runs on changes under eureka/</text>
  <text x="596" y="482" class="cardBody">Commands: chmod +x mvnw, mvnw test</text>

  <rect x="980" y="330" width="360" height="180" rx="24" fill="#EDF6FF" stroke="#BDD7F0" stroke-width="1.5" filter="url(#ciShadow)"/>
  <text x="1016" y="378" class="cardMeta">configserver.yml</text>
  <text x="1016" y="416" class="cardTitle">Config Server pipeline</text>
  <text x="1016" y="454" class="cardBody">Runs on changes under</text>
  <text x="1016" y="482" class="cardBody">configserver/</text>
  <text x="1016" y="510" class="cardBody">Commands: chmod +x mvnw, mvnw test</text>

  <rect x="1400" y="330" width="360" height="180" rx="24" fill="#EDF6FF" stroke="#BDD7F0" stroke-width="1.5" filter="url(#ciShadow)"/>
  <text x="1436" y="378" class="cardMeta">gateway.yml</text>
  <text x="1436" y="416" class="cardTitle">Gateway pipeline</text>
  <text x="1436" y="454" class="cardBody">Runs on changes under gateway/</text>
  <text x="1436" y="482" class="cardBody">Commands: chmod +x mvnw, mvnw test</text>

  <rect x="140" y="590" width="360" height="180" rx="24" fill="#EDF6FF" stroke="#BDD7F0" stroke-width="1.5" filter="url(#ciShadow)"/>
  <text x="176" y="638" class="cardMeta">userservice.yml</text>
  <text x="176" y="676" class="cardTitle">User Service pipeline</text>
  <text x="176" y="714" class="cardBody">Runs on changes under</text>
  <text x="176" y="742" class="cardBody">userservice/</text>
  <text x="176" y="770" class="cardBody">Commands: chmod +x mvnw, mvnw test</text>

  <rect x="560" y="590" width="360" height="180" rx="24" fill="#EDF6FF" stroke="#BDD7F0" stroke-width="1.5" filter="url(#ciShadow)"/>
  <text x="596" y="638" class="cardMeta">activityservice.yml</text>
  <text x="596" y="676" class="cardTitle">Activity Service pipeline</text>
  <text x="596" y="714" class="cardBody">Runs on changes under</text>
  <text x="596" y="742" class="cardBody">activityservice/</text>
  <text x="596" y="770" class="cardBody">Commands: chmod +x mvnw, mvnw test</text>

  <rect x="980" y="590" width="360" height="180" rx="24" fill="#EDF6FF" stroke="#BDD7F0" stroke-width="1.5" filter="url(#ciShadow)"/>
  <text x="1016" y="638" class="cardMeta">aiservice.yml</text>
  <text x="1016" y="676" class="cardTitle">AI Service pipeline</text>
  <text x="1016" y="714" class="cardBody">Runs on changes under</text>
  <text x="1016" y="742" class="cardBody">aiservice/</text>
  <text x="1016" y="770" class="cardBody">Commands: chmod +x mvnw, mvnw test</text>

  <rect x="1400" y="590" width="360" height="180" rx="24" fill="#F8FAFB" stroke="#CCD7D1" stroke-width="1.5" filter="url(#ciShadow)"/>
  <text x="1436" y="638" class="cardMeta">Trigger policy</text>
  <text x="1436" y="676" class="cardTitle">Path-scoped runs</text>
  <text x="1436" y="714" class="cardBody">Each workflow watches only its</text>
  <text x="1436" y="742" class="cardBody">own service directory plus the</text>
  <text x="1436" y="770" class="cardBody">workflow file itself.</text>

  <rect x="140" y="850" width="1620" height="230" rx="28" fill="#FFFFFF" stroke="#CCD7D1" stroke-width="1.5"/>
  <text x="180" y="908" class="panelTitle">What this gives the repository</text>
  <text x="180" y="960" class="cardBody">• Frontend failures do not block unrelated backend changes from being identified precisely.</text>
  <text x="180" y="1000" class="cardBody">• Each microservice advertises its own health through a dedicated workflow run.</text>
  <text x="180" y="1040" class="cardBody">• Pull requests changing one service only trigger the workflows that matter.</text>
</svg>
