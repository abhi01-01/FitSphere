<svg width="2200" height="1500" viewBox="0 0 2200 1500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dBg" x1="0" y1="0" x2="2200" y2="1500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F8FA"/>
      <stop offset="1" stop-color="#EEF3F1"/>
    </linearGradient>
    <filter id="dShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="dArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </marker>
    <style>
      .title { font: 700 44px Inter, Arial, sans-serif; fill: #11211B; }
      .subtitle { font: 500 20px Inter, Arial, sans-serif; fill: #5B6B63; }
      .panel { fill: #FFFFFF; stroke: #D8E1DC; stroke-width: 1.5; }
      .panelTitle { font: 700 24px Inter, Arial, sans-serif; fill: #173C30; }
      .cardTitle { font: 700 20px Inter, Arial, sans-serif; fill: #13221B; }
      .cardMeta { font: 600 14px Inter, Arial, sans-serif; fill: #206A4B; }
      .cardBody { font: 500 16px Inter, Arial, sans-serif; fill: #56655E; }
      .line { stroke: #475569; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#dArrow); }
      .lineSoft { stroke: #94A3B8; stroke-width: 2; stroke-dasharray: 8 8; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#dArrow); }
    </style>
  </defs>

  <rect width="2200" height="1500" fill="url(#dBg)"/>
  <text x="90" y="96" class="title">Deployment Topology</text>
  <text x="90" y="132" class="subtitle">This view separates public entrypoints, the internal service network, and stateful dependencies used in Docker Compose or an equivalent runtime environment.</text>

  <rect x="90" y="210" width="460" height="1180" rx="34" class="panel"/>
  <text x="140" y="268" class="panelTitle">Public Edge</text>
  <rect x="140" y="330" width="360" height="160" rx="26" fill="#FFF8EE" stroke="#F1D1B2" stroke-width="1.5" filter="url(#dShadow)"/>
  <text x="176" y="378" class="cardMeta">BROWSER / HTTPS</text>
  <text x="176" y="416" class="cardTitle">User Browser</text>
  <text x="176" y="454" class="cardBody">Loads the SPA, signs in with Keycloak,</text>
  <text x="176" y="482" class="cardBody">and sends API requests through the gateway.</text>

  <rect x="140" y="610" width="360" height="180" rx="26" fill="#F0F7F3" stroke="#BCD6C8" stroke-width="1.5" filter="url(#dShadow)"/>
  <text x="176" y="658" class="cardMeta">NGINX + STATIC ASSETS</text>
  <text x="176" y="696" class="cardTitle">Frontend Container</text>
  <text x="176" y="734" class="cardBody">Serves the Vite bundle in Docker mode.</text>
  <text x="176" y="762" class="cardBody">Default host port: 3000.</text>

  <rect x="140" y="910" width="360" height="210" rx="26" fill="#F7F4FF" stroke="#D7CCF2" stroke-width="1.5" filter="url(#dShadow)"/>
  <text x="176" y="958" class="cardMeta">OIDC / IAM</text>
  <text x="176" y="996" class="cardTitle">Keycloak</text>
  <text x="176" y="1034" class="cardBody">Realm: fitSphere-auth</text>
  <text x="176" y="1062" class="cardBody">Client: oauth2-pkce-client</text>
  <text x="176" y="1090" class="cardBody">Default host port: 8181.</text>

  <rect x="620" y="210" width="960" height="1180" rx="34" class="panel"/>
  <text x="670" y="268" class="panelTitle">Internal Service Network</text>

  <rect x="690" y="330" width="260" height="160" rx="24" fill="#FFFFFF" stroke="#CCD7D1" stroke-width="1.5" filter="url(#dShadow)"/>
  <text x="724" y="378" class="cardMeta">SPRING CLOUD</text>
  <text x="724" y="416" class="cardTitle">API Gateway</text>
  <text x="724" y="454" class="cardBody">JWT validation, routing, CORS,</text>
  <text x="724" y="482" class="cardBody">and user identity propagation.</text>

  <rect x="1040" y="330" width="220" height="160" rx="24" fill="#FFFFFF" stroke="#CCD7D1" stroke-width="1.5" filter="url(#dShadow)"/>
  <text x="1072" y="378" class="cardMeta">SPRING CLOUD</text>
  <text x="1072" y="416" class="cardTitle">Config Server</text>
  <text x="1072" y="454" class="cardBody">Native configuration source.</text>

  <rect x="1330" y="330" width="200" height="160" rx="24" fill="#FFFFFF" stroke="#CCD7D1" stroke-width="1.5" filter="url(#dShadow)"/>
  <text x="1360" y="378" class="cardMeta">NETFLIX OSS</text>
  <text x="1360" y="416" class="cardTitle">Eureka</text>
  <text x="1360" y="454" class="cardBody">Service registry.</text>

  <rect x="690" y="620" width="260" height="180" rx="24" fill="#EDF6FF" stroke="#BDD7F0" stroke-width="1.5" filter="url(#dShadow)"/>
  <text x="724" y="668" class="cardMeta">SPRING BOOT</text>
  <text x="724" y="706" class="cardTitle">User Service</text>
  <text x="724" y="744" class="cardBody">User registration, user lookup,</text>
  <text x="724" y="772" class="cardBody">Keycloak subject validation.</text>

  <rect x="1010" y="620" width="260" height="180" rx="24" fill="#EDF6FF" stroke="#BDD7F0" stroke-width="1.5" filter="url(#dShadow)"/>
  <text x="1044" y="668" class="cardMeta">SPRING BOOT</text>
  <text x="1044" y="706" class="cardTitle">Activity Service</text>
  <text x="1044" y="744" class="cardBody">Activity persistence and</text>
  <text x="1044" y="772" class="cardBody">event publishing.</text>

  <rect x="1330" y="620" width="200" height="180" rx="24" fill="#FFF6F1" stroke="#F0C8B4" stroke-width="1.5" filter="url(#dShadow)"/>
  <text x="1360" y="668" class="cardMeta">SPRING BOOT</text>
  <text x="1360" y="706" class="cardTitle">AI Service</text>
  <text x="1360" y="744" class="cardBody">Recommendation generation</text>
  <text x="1360" y="772" class="cardBody">and retrieval.</text>

  <rect x="690" y="950" width="840" height="280" rx="28" fill="#F8FAFB" stroke="#CCD7D1" stroke-width="1.5"/>
  <text x="730" y="1000" class="panelTitle">Internal Runtime Rules</text>
  <text x="730" y="1050" class="cardBody">• Only the gateway is a public API entrypoint for application traffic.</text>
  <text x="730" y="1090" class="cardBody">• Config Server and Eureka stay on the internal network.</text>
  <text x="730" y="1130" class="cardBody">• User identity is derived from JWT subject at the gateway, not from client-supplied headers.</text>
  <text x="730" y="1170" class="cardBody">• Activity creation is synchronous; recommendation generation is asynchronous.</text>

  <rect x="1650" y="210" width="460" height="1180" rx="34" class="panel"/>
  <text x="1700" y="268" class="panelTitle">Stateful Dependencies</text>

  <rect x="1710" y="330" width="340" height="150" rx="24" fill="#FFFFFF" stroke="#CCD7D1" stroke-width="1.5" filter="url(#dShadow)"/>
  <text x="1746" y="378" class="cardMeta">POSTGRESQL</text>
  <text x="1746" y="416" class="cardTitle">Users Database</text>
  <text x="1746" y="454" class="cardBody">Owned by userservice.</text>

  <rect x="1710" y="550" width="340" height="150" rx="24" fill="#FFFFFF" stroke="#CCD7D1" stroke-width="1.5" filter="url(#dShadow)"/>
  <text x="1746" y="598" class="cardMeta">MONGODB</text>
  <text x="1746" y="636" class="cardTitle">Activity Database</text>
  <text x="1746" y="674" class="cardBody">Owned by activityservice.</text>

  <rect x="1710" y="770" width="340" height="150" rx="24" fill="#FFFFFF" stroke="#CCD7D1" stroke-width="1.5" filter="url(#dShadow)"/>
  <text x="1746" y="818" class="cardMeta">RABBITMQ</text>
  <text x="1746" y="856" class="cardTitle">Event Broker</text>
  <text x="1746" y="894" class="cardBody">Carries activity events to aiservice.</text>

  <rect x="1710" y="990" width="340" height="150" rx="24" fill="#FFFFFF" stroke="#CCD7D1" stroke-width="1.5" filter="url(#dShadow)"/>
  <text x="1746" y="1038" class="cardMeta">MONGODB</text>
  <text x="1746" y="1076" class="cardTitle">AI Database</text>
  <text x="1746" y="1114" class="cardBody">Owned by aiservice.</text>

  <rect x="1710" y="1210" width="340" height="120" rx="24" fill="#FFFFFF" stroke="#CCD7D1" stroke-width="1.5" filter="url(#dShadow)"/>
  <text x="1746" y="1258" class="cardMeta">EXTERNAL API</text>
  <text x="1746" y="1296" class="cardTitle">Gemini</text>

  <path d="M500 410H690" class="line"/>
  <path d="M320 490V610" class="line"/>
  <path d="M500 1015H690V410" class="lineSoft"/>
  <path d="M950 410H1040" class="lineSoft"/>
  <path d="M950 440H1330" class="lineSoft"/>
  <path d="M820 490V620" class="lineSoft"/>
  <path d="M1140 490V620" class="lineSoft"/>
  <path d="M1430 490V620" class="lineSoft"/>
  <path d="M950 710H1710" class="line"/>
  <path d="M1270 710H1710V845" class="line"/>
  <path d="M1530 710H1710V1065" class="line"/>
  <path d="M1530 740H1710V1270" class="line"/>
  <path d="M950 710H1710V405" class="line"/>
</svg>
