server:
  port: ${USER_SERVICE_PORT:8081}

spring:
  application:
    name: user-service
  datasource:
    url: ${USER_SERVICE_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fitSphere}
    username: ${USER_SERVICE_DATASOURCE_USERNAME:postgres}
    password: ${USER_SERVICE_DATASOURCE_PASSWORD:postgres}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE:http://localhost:8761/eureka/}

app:
  internal:
    token: ${INTERNAL_SERVICE_TOKEN:fitsphere-internal-dev-token}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    level: "%5p [corr=%X{correlationId:-}]"
