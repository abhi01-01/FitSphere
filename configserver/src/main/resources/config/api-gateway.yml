spring:
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8181/realms/fitSphere-auth/protocol/openid-connect/certs}
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**

        - id: activity-service
          uri: lb://ACTIVITY-SERVICE
          predicates:
            - Path=/api/activities/**

        - id: ai-service
          uri: lb://AI-SERVICE
          predicates:
            - Path=/api/recommendations/**

server:
  port: ${API_GATEWAY_PORT:8080}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE:http://localhost:8761/eureka/}

app:
  security:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
    internal-token: ${INTERNAL_SERVICE_TOKEN:fitsphere-internal-dev-token}
    require-https: ${GATEWAY_REQUIRE_HTTPS:false}

client:
  user-service:
    base-url: ${USER_SERVICE_BASE_URL:http://USER-SERVICE}
    connect-timeout: ${USER_SERVICE_CONNECT_TIMEOUT:2s}
    response-timeout: ${USER_SERVICE_RESPONSE_TIMEOUT:3s}
    read-timeout: ${USER_SERVICE_READ_TIMEOUT:3s}
    write-timeout: ${USER_SERVICE_WRITE_TIMEOUT:3s}
    request-timeout: ${USER_SERVICE_REQUEST_TIMEOUT:4s}
    retries: ${USER_SERVICE_RETRIES:2}
    retry-backoff: ${USER_SERVICE_RETRY_BACKOFF:200ms}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    level: "%5p [corr=%X{correlationId:-}]"
