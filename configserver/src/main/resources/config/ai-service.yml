server:
  port: ${AI_SERVICE_PORT:8083}

spring:
  application:
    name: ai-service
  data:
    mongodb:
      uri: ${AI_MONGODB_URI:mongodb://localhost:27017/fitSphereAiService}
      database: ${AI_MONGODB_DATABASE:fitSphereAiService}
      auto-index-creation: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}


eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE:http://localhost:8761/eureka/}


rabbitmq:
  exchange:
    name: ${FITNESS_RABBITMQ_EXCHANGE:fitness.exchange}
  queue:
    name: ${FITNESS_ACTIVITY_QUEUE:activity.queue}
  routing:
    key: ${FITNESS_ACTIVITY_ROUTING_KEY:activity.tracking}
  dead-letter:
    exchange: ${FITNESS_ACTIVITY_DLX:fitness.exchange.dlx}
    queue: ${FITNESS_ACTIVITY_DLQ:activity.queue.dlq}
    routing-key: ${FITNESS_ACTIVITY_DLQ_ROUTING_KEY:activity.dead-letter}
  listener:
    max-attempts: ${FITNESS_ACTIVITY_LISTENER_MAX_ATTEMPTS:3}
    concurrency: ${FITNESS_ACTIVITY_LISTENER_CONCURRENCY:1}
    max-concurrency: ${FITNESS_ACTIVITY_LISTENER_MAX_CONCURRENCY:4}
    prefetch: ${FITNESS_ACTIVITY_LISTENER_PREFETCH:10}


gemini:
  api:
    base-url: ${GEMINI_API_BASE_URL:https://generativelanguage.googleapis.com}
    key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
    connect-timeout: ${GEMINI_CONNECT_TIMEOUT:30s}
    response-timeout: ${GEMINI_RESPONSE_TIMEOUT:60s}
    read-timeout: ${GEMINI_READ_TIMEOUT:60s}
    write-timeout: ${GEMINI_WRITE_TIMEOUT:60s}
    request-timeout: ${GEMINI_REQUEST_TIMEOUT:60s}
    retries: ${GEMINI_RETRIES:1}
    retry-backoff: ${GEMINI_RETRY_BACKOFF:500ms}

app:
  internal:
    token: ${INTERNAL_SERVICE_TOKEN:fitsphere-internal-dev-token}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    level: "%5p [corr=%X{correlationId:-}]"
  level:
    reactor.netty.http.client.HttpClientConnect: ERROR
