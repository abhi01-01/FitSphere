apiVersion: v1
kind: ConfigMap
metadata:
  name: fitsphere-config
data:
  SPRING_CONFIG_IMPORT: optional:configserver:http://configserver:8888
  EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE: http://eureka:8761/eureka/
  USER_SERVICE_BASE_URL: http://USER-SERVICE
  USER_SERVICE_CONNECT_TIMEOUT: 2s
  USER_SERVICE_RESPONSE_TIMEOUT: 3s
  USER_SERVICE_READ_TIMEOUT: 3s
  USER_SERVICE_WRITE_TIMEOUT: 3s
  USER_SERVICE_REQUEST_TIMEOUT: 4s
  USER_SERVICE_RETRIES: "2"
  USER_SERVICE_RETRY_BACKOFF: 200ms
  JPA_DDL_AUTO: validate
  ACTIVITY_MONGODB_DATABASE: fitSphereActivity
  AI_MONGODB_DATABASE: fitSphereAiService
  RABBITMQ_PORT: "5672"
  FITNESS_RABBITMQ_EXCHANGE: fitness.exchange
  FITNESS_ACTIVITY_QUEUE: activity.queue
  FITNESS_ACTIVITY_ROUTING_KEY: activity.tracking
  FITNESS_ACTIVITY_DLX: fitness.exchange.dlx
  FITNESS_ACTIVITY_DLQ: activity.queue.dlq
  FITNESS_ACTIVITY_DLQ_ROUTING_KEY: activity.dead-letter
  FITNESS_ACTIVITY_LISTENER_MAX_ATTEMPTS: "3"
  FITNESS_ACTIVITY_LISTENER_CONCURRENCY: "2"
  FITNESS_ACTIVITY_LISTENER_MAX_CONCURRENCY: "4"
  FITNESS_ACTIVITY_LISTENER_PREFETCH: "20"
  GEMINI_MODEL: gemini-2.5-flash
  GEMINI_CONNECT_TIMEOUT: 3s
  GEMINI_RESPONSE_TIMEOUT: 30s
  GEMINI_READ_TIMEOUT: 30s
  GEMINI_WRITE_TIMEOUT: 10s
  GEMINI_REQUEST_TIMEOUT: 35s
  GEMINI_RETRIES: "1"
  GEMINI_RETRY_BACKOFF: 500ms
  CORS_ALLOWED_ORIGINS: https://app.example.com
  GATEWAY_REQUIRE_HTTPS: "true"
  KEYCLOAK_REALM: fitSphere-auth
  KEYCLOAK_CLIENT_ID: oauth2-pkce-client
