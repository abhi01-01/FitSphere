apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: fitsphere-alerts
spec:
  groups:
    - name: fitsphere
      rules:
        - alert: FitSphereServiceDown
          expr: up{service=~"gateway|userservice|activityservice|aiservice|configserver|eureka"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "FitSphere service down"
            description: "A FitSphere service has stopped responding to Prometheus scrapes for at least 2 minutes."
        - alert: FitSphereGatewayHigh5xxRate
          expr: |
            (
              sum(rate(http_server_requests_seconds_count{application="api-gateway",status=~"5.."}[5m]))
              /
              clamp_min(sum(rate(http_server_requests_seconds_count{application="api-gateway"}[5m])), 1)
            ) > 0.05
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Gateway 5xx rate is elevated"
            description: "More than 5% of gateway requests have been returning 5xx responses for 10 minutes."
