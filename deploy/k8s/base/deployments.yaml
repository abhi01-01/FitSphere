apiVersion: apps/v1
kind: Deployment
metadata:
  name: userservice
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/component: userservice
  template:
    metadata:
      labels:
        app.kubernetes.io/component: userservice
    spec:
      containers:
        - name: userservice
          image: ghcr.io/your-org/fitsphere-userservice:latest
          envFrom:
            - configMapRef:
                name: fitsphere-config
            - secretRef:
                name: fitsphere-secrets
          ports:
            - containerPort: 8081
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 1000m
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 25
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 20
---
