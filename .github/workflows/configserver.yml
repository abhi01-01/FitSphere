name: configserver

on:
  push:
    paths:
      - "configserver/**"
      - ".github/workflows/configserver.yml"
  pull_request:
    paths:
      - "configserver/**"
      - ".github/workflows/configserver.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: configserver
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - run: chmod +x mvnw
      - run: ./mvnw test
