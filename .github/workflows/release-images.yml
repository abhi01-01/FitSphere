name: release-images

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/release-images.yml"
      - "activityservice/**"
      - "aiservice/**"
      - "configserver/**"
      - "eureka/**"
      - "fitness-app-frontend/**"
      - "gateway/**"
      - "userservice/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build-push-scan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: frontend
            context: fitness-app-frontend
            dockerfile: fitness-app-frontend/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/fitsphere-frontend
            build_args: |
              VITE_API_BASE_URL=${{ vars.FRONTEND_API_BASE_URL || 'https://api.example.com/api' }}
              VITE_KEYCLOAK_BASE_URL=${{ vars.FRONTEND_KEYCLOAK_BASE_URL || 'https://keycloak.example.com' }}
              VITE_KEYCLOAK_REALM=${{ vars.FRONTEND_KEYCLOAK_REALM || 'fitSphere-auth' }}
              VITE_KEYCLOAK_CLIENT_ID=${{ vars.FRONTEND_KEYCLOAK_CLIENT_ID || 'oauth2-pkce-client' }}
              VITE_APP_URL=${{ vars.FRONTEND_APP_URL || 'https://app.example.com' }}
          - name: gateway
            context: gateway
            dockerfile: gateway/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/fitsphere-gateway
            build_args: ""
          - name: userservice
            context: userservice
            dockerfile: userservice/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/fitsphere-userservice
            build_args: ""
          - name: activityservice
            context: activityservice
            dockerfile: activityservice/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/fitsphere-activityservice
            build_args: ""
          - name: aiservice
            context: aiservice
            dockerfile: aiservice/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/fitsphere-aiservice
            build_args: ""
          - name: configserver
            context: configserver
            dockerfile: configserver/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/fitsphere-configserver
            build_args: ""
          - name: eureka
            context: eureka
            dockerfile: eureka/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/fitsphere-eureka
            build_args: ""

    steps:
      - uses: actions/checkout@v4

      - name: Normalize registry owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/fitsphere-${{ matrix.name }}:sha-${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/fitsphere-${{ matrix.name }}:latest

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ghcr.io/${{ env.OWNER_LC }}/fitsphere-${{ matrix.name }}:sha-${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: CRITICAL,HIGH
          vuln-type: os,library

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
