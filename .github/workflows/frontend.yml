name: frontend

on:
  push:
    paths:
      - "fitness-app-frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "fitness-app-frontend/**"
      - ".github/workflows/frontend.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitness-app-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: fitness-app-frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build
