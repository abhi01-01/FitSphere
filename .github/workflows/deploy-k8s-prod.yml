name: deploy-k8s-prod

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Container image tag to deploy, for example sha-<commit>"
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Normalize registry owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - uses: azure/setup-kubectl@v4
        with:
          version: v1.30.2

      - uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.4.2"

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' '${{ secrets.KUBE_CONFIG }}' > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Ensure namespace exists
        run: kubectl create namespace fitsphere-prod --dry-run=client -o yaml | kubectl apply -f -

      - name: Create or update runtime secret
        run: |
          kubectl -n fitsphere-prod create secret generic fitsphere-secrets \
            --from-literal=USER_SERVICE_DATASOURCE_URL='${{ secrets.USER_SERVICE_DATASOURCE_URL }}' \
            --from-literal=USER_SERVICE_DATASOURCE_USERNAME='${{ secrets.USER_SERVICE_DATASOURCE_USERNAME }}' \
            --from-literal=USER_SERVICE_DATASOURCE_PASSWORD='${{ secrets.USER_SERVICE_DATASOURCE_PASSWORD }}' \
            --from-literal=ACTIVITY_MONGODB_URI='${{ secrets.ACTIVITY_MONGODB_URI }}' \
            --from-literal=AI_MONGODB_URI='${{ secrets.AI_MONGODB_URI }}' \
            --from-literal=RABBITMQ_HOST='${{ secrets.RABBITMQ_HOST }}' \
            --from-literal=RABBITMQ_USERNAME='${{ secrets.RABBITMQ_USERNAME }}' \
            --from-literal=RABBITMQ_PASSWORD='${{ secrets.RABBITMQ_PASSWORD }}' \
            --from-literal=GEMINI_API_KEY='${{ secrets.GEMINI_API_KEY }}' \
            --from-literal=KEYCLOAK_JWK_SET_URI='${{ secrets.KEYCLOAK_JWK_SET_URI }}' \
            --from-literal=INTERNAL_SERVICE_TOKEN='${{ secrets.INTERNAL_SERVICE_TOKEN }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Prepare overlay with image tags
        run: |
          cp -R deploy/k8s /tmp/fitsphere-k8s
          cd /tmp/fitsphere-k8s/overlays/prod
          kustomize edit set image \
            ghcr.io/your-org/fitsphere-frontend=ghcr.io/${{ env.OWNER_LC }}/fitsphere-frontend:${{ inputs.image_tag }} \
            ghcr.io/your-org/fitsphere-gateway=ghcr.io/${{ env.OWNER_LC }}/fitsphere-gateway:${{ inputs.image_tag }} \
            ghcr.io/your-org/fitsphere-userservice=ghcr.io/${{ env.OWNER_LC }}/fitsphere-userservice:${{ inputs.image_tag }} \
            ghcr.io/your-org/fitsphere-activityservice=ghcr.io/${{ env.OWNER_LC }}/fitsphere-activityservice:${{ inputs.image_tag }} \
            ghcr.io/your-org/fitsphere-aiservice=ghcr.io/${{ env.OWNER_LC }}/fitsphere-aiservice:${{ inputs.image_tag }} \
            ghcr.io/your-org/fitsphere-configserver=ghcr.io/${{ env.OWNER_LC }}/fitsphere-configserver:${{ inputs.image_tag }} \
            ghcr.io/your-org/fitsphere-eureka=ghcr.io/${{ env.OWNER_LC }}/fitsphere-eureka:${{ inputs.image_tag }}

      - name: Apply manifests
        run: kubectl apply -k /tmp/fitsphere-k8s/overlays/prod

      - name: Wait for rollouts
        run: |
          kubectl -n fitsphere-prod rollout status deployment/frontend --timeout=180s
          kubectl -n fitsphere-prod rollout status deployment/eureka --timeout=180s
          kubectl -n fitsphere-prod rollout status deployment/configserver --timeout=180s
          kubectl -n fitsphere-prod rollout status deployment/userservice --timeout=180s
          kubectl -n fitsphere-prod rollout status deployment/activityservice --timeout=180s
          kubectl -n fitsphere-prod rollout status deployment/aiservice --timeout=180s
          kubectl -n fitsphere-prod rollout status deployment/gateway --timeout=180s
